name: Update WalkGoo Cache

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *' # KST 03:00

permissions:
  contents: write

jobs:
  update-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Update WalkGoo cache JSON
        env:
          TOUR_API_KEY: ${{ secrets.TOUR_API_KEY }}
          DURUNUBI_API_KEY: ${{ secrets.DURUNUBI_API_KEY }}
          API_DELAY_MS: 800
        run: node scripts/update-cache.mjs
      - name: Commit cache changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cache data/merged
          git diff --cached --quiet || git commit -m "Update WalkGoo cache data"
          git push
