<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WalkGoo - 걷고 싶은 대한민국</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="hero">
    <nav class="topbar">
      <div class="logo" onclick="location.href='index.html'">WalkGoo</div>
      <div class="nav-text">Walk Korea</div>
    </nav>
    <div class="hero-content">
      <p class="eyebrow">둘레길 · 섬 여행 · 제주 오름</p>
      <h1>걷고 싶은 대한민국</h1>
      <p class="hero-desc">느리게 걸으며 만나는 길, 바다, 숲, 오름 여행을 소개합니다.</p>
      <div class="search-box">
        <input id="searchInput" type="text" placeholder="예: 제주 오름, 청산도, 둘레길" />
        <button id="searchBtn">검색</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section>
      <div class="section-title">
        <h2>테마로 걷기</h2>
        <p>원하는 여행 스타일을 선택해 보세요.</p>
      </div>
      <div id="themeGrid" class="theme-grid"></div>
    </section>

    <section class="place-section">
      <div class="section-title row-title">
        <div>
          <h2 id="placeTitle">추천 걷기 여행</h2>
          <p id="placeSubTitle">처음 가도 부담 없는 대표 코스입니다.</p>
        </div>
        <select id="sortSelect" aria-label="정렬">
          <option value="default">기본순</option>
          <option value="easy">쉬운 코스 먼저</option>
          <option value="time">짧은 시간 먼저</option>
        </select>
      </div>
      <div id="filterChips" class="chips"></div>
      <div id="placeGrid" class="place-grid"></div>
    </section>
  </main>

  <footer>
    <p>WalkGoo · 걷고 싶은 대한민국</p>
    <p>정적 웹앱 샘플 프로젝트</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
